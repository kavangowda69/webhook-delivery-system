services:

  webhook_postgres:
    image: postgres:15
    container_name: webhook_postgres
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  webhook_api:
    build: .
    container_name: webhook_api
    ports:
      - "8000:8000"
    depends_on:
      webhook_postgres:
        condition: service_healthy